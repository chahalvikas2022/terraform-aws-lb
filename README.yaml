description: |
  A production-grade, reusable AWS Load Balancer module (ALB, NLB, CLB) by OpsStation.
  Designed for reliability, performance, and security — following AWS networking best practices.

introduction: |
  This module allows you to deploy and manage AWS Load Balancers including
  Application Load Balancer (ALB), Network Load Balancer (NLB), and Classic Load Balancer (CLB).
  It supports listeners, target groups, SSL/TLS, access logs, and integrates seamlessly with EC2, ASG, and ECS.
  Built following OpsStation best practices for high availability, scalability, and fault tolerance.

